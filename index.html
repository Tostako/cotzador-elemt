<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sistema de cotización y generación de cuentas de cobro profesional">
    <meta name="theme-color" content="#b69462">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ELEMENT">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" href="/favicon-logo.png">
    <link rel="icon" type="image/png" href="/favicon-logo.png">
    <title>ELEMENT - Cotizador</title>
    <style>
      #app-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: #070707; transition: opacity .45s ease;
      }
      #app-splash.hidden { opacity: 0; pointer-events: none; }
      .app-splash-inner { display: flex; flex-direction: column; align-items: center; gap: 22px; }
      #app-splash img { width: 64px; height: 64px; filter: drop-shadow(0 0 24px rgba(182,148,98,0.45)); animation: splashPulse 1.6s ease-in-out infinite; }
      .app-splash-ring {
        width: 34px; height: 34px; border-radius: 50%;
        border: 3px solid rgba(182,148,98,0.22); border-top-color: #b69462;
        animation: splashSpin .8s linear infinite;
      }
      @keyframes splashSpin { to { transform: rotate(360deg); } }
      @keyframes splashPulse { 0%, 100% { opacity: 1; } 50% { opacity: .55; } }
    </style>
  </head>
  <body>
    <!-- Splash instantáneo (HTML puro) mientras descarga/parsea el JS -->
    <div id="app-splash" aria-hidden="true">
      <div class="app-splash-inner">
        <img src="/favicon-logo.png" alt="" width="64" height="64" />
        <div class="app-splash-ring"></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      window.__hideSplash = function () {
        var s = document.getElementById('app-splash');
        if (!s) return;
        s.classList.add('hidden');
        setTimeout(function () { if (s && s.parentNode) s.parentNode.removeChild(s); }, 500);
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
